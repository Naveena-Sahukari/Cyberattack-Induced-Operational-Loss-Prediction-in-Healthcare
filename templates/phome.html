<form method="POST">
    {% csrf_token %}

    <label>Attack Type:</label>
    <input type="number" name="attack_type" required><br>

    <label>Attack Vector:</label>
    <input type="number" name="attack_vector" required><br>

    <label>System Affected:</label>
    <input type="number" name="system_affected" required><br>

    <label>Security Maturity:</label>
    <input type="number" step="0.1" name="security_maturity" required><br>

    <label>Downtime (hours):</label>
    <input type="number" step="0.1" name="downtime" required><br>

    <label>Detection Delay:</label>
    <input type="number" step="0.1" name="detection_delay" required><br>

    <label>Records Compromised:</label>
    <input type="number" name="records_compromised" required><br>

    <button type="submit">Predict Loss</button>
</form>
